<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Planet Explorer 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:  #FFD93D;
    --red:   #E63946;
    --space: #050a1a;
    --deep:  #0a1628;
    --panel: rgba(255,255,255,0.06);
    --bord:  rgba(255,255,255,0.12);
    --green: #2DC653;
    --wrong: #E63946;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { min-height: 100%; }
  body { font-family: 'Nunito', sans-serif; background: var(--space); min-height: 100vh; position: relative; overflow-x: hidden; }

  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .stars::before, .stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 70%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 5%,  rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 5%  50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 40%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 20% 65%, rgba(255,255,255,0.7) 0%, transparent 100%);
    background-size: 400px 400px;
  }
  .stars::after {
    background-size: 600px 600px;
    opacity: 0.5;
    animation: twinkle 8s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.7; } }

  .page { position: relative; z-index: 1; min-height: 100vh; padding: 20px 16px 48px; max-width: 640px; margin: 0 auto; }

  .btn-back { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 2px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); border: 2px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 8px 18px; cursor: pointer; transition: all 0.15s; text-decoration: none; margin-bottom: 16px; display: block; width: fit-content; }
  .btn-back:hover { background: rgba(255,255,255,0.12); color: white; }

  .header { text-align: center; margin-bottom: 16px; animation: dropIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes dropIn { from { transform: translateY(-50px) scale(0.85); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
  .header h1 { font-family: 'Bangers', cursive; font-size: clamp(2.2rem, 8vw, 3.5rem); color: var(--gold); letter-spacing: 3px; line-height: 1; text-shadow: 3px 3px 0 rgba(100,0,200,0.5), 6px 6px 0 rgba(0,0,0,0.4); }
  .header p { color: rgba(255,255,255,0.5); font-weight: 700; font-size: 0.88rem; margin-top: 6px; letter-spacing: 1px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; background: var(--panel); border: 2px solid var(--bord); border-radius: 16px; padding: 10px 16px; margin-bottom: 14px; }
  .score-label { font-family: 'Bangers', cursive; font-size: 1rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; }
  .score-val   { font-family: 'Bangers', cursive; font-size: 1.8rem; color: var(--gold); text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
  .progress-wrap { flex: 1; margin: 0 14px; }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 50px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7B2FBE, var(--gold)); border-radius: 50px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(123,47,190,0.6); }
  .progress-text { font-size: 0.72rem; color: rgba(255,255,255,0.4); font-weight: 700; text-align: center; margin-top: 3px; letter-spacing: 1px; }

  .phase-badge { text-align: center; margin-bottom: 12px; }
  .phase-pill { display: inline-block; font-family: 'Bangers', cursive; font-size: 0.9rem; letter-spacing: 2px; padding: 5px 16px; border-radius: 50px; border: 2px solid; }
  .phase-pill.p1 { background: rgba(123,47,190,0.15); border-color: rgba(123,47,190,0.5); color: #b87fff; }
  .phase-pill.p2 { background: rgba(255,217,61,0.12); border-color: rgba(255,217,61,0.4); color: var(--gold); }

  .planet-card { background: var(--panel); border: 2px solid var(--bord); border-radius: 24px; padding: 24px 20px; margin-bottom: 14px; text-align: center; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .planet-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(123,47,190,0.08), transparent 70%); pointer-events: none; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .planet-visual { margin: 0 auto 16px; position: relative; display: flex; align-items: center; justify-content: center; }

  .planet-body { border-radius: 50%; position: relative; flex-shrink: 0; box-shadow: inset -8px -8px 20px rgba(0,0,0,0.5), inset 4px 4px 12px rgba(255,255,255,0.15); }

  .ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .planet-ring { position: absolute; border-radius: 50%; border-style: solid; transform: rotateX(70deg); pointer-events: none; }

  .planet-mercury .planet-body { width:80px;height:80px; background:radial-gradient(circle at 38% 38%, #b0a090, #6b5f55 60%, #3d3530); }
  .planet-venus   .planet-body { width:100px;height:100px; background:radial-gradient(circle at 38% 35%, #f5e6a0, #d4a84b 55%, #a07020); box-shadow: inset -8px -8px 20px rgba(0,0,0,0.4), inset 4px 4px 12px rgba(255,255,200,0.3), 0 0 20px rgba(220,180,60,0.3); }
  .planet-earth   .planet-body { width:100px;height:100px; background:radial-gradient(circle at 38% 35%, #4fa3d1, #2877b8 45%, #1a5a8a); }
  .planet-earth   .planet-body::after { content:''; position:absolute; inset:0; border-radius:50%; background: radial-gradient(ellipse 60% 40% at 55% 35%, rgba(60,160,60,0.7) 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 30% 60%, rgba(60,150,60,0.5) 0%, transparent 50%); }
  .planet-mars    .planet-body { width:88px;height:88px; background:radial-gradient(circle at 38% 35%, #e8795a, #c0412a 55%, #8b2518); box-shadow: inset -8px -8px 20px rgba(0,0,0,0.4), inset 4px 4px 12px rgba(255,180,140,0.2), 0 0 15px rgba(200,60,30,0.2); }
  .planet-jupiter .planet-body { width:130px;height:130px; background: repeating-linear-gradient(180deg, #c88040 0px, #e8a060 12px, #d4704a 24px, #f0b878 36px, #c87040 48px, #e89858 60px, #d06030 72px, #e8a060 84px, #c88040 96px, #dda060 108px, #c07030 120px, #e09050 132px); border-radius:50%; }
  .planet-jupiter .planet-body::after { content:''; position:absolute; width:32px;height:20px; background:radial-gradient(ellipse, #d44030, #a02820 70%); border-radius:50%; bottom:38px; left:28px; opacity:0.85; }
  .planet-saturn  .ring-wrap { width:180px; height:130px; }
  .planet-saturn  .planet-body { width:110px;height:110px; background:radial-gradient(circle at 40% 38%, #f0d890, #c8a840 50%, #9a7820); z-index:2; }
  .planet-saturn  .planet-ring { width:170px;height:50px; border-width:10px; border-color: rgba(210,180,80,0.7); z-index:1; }
  .planet-saturn  .planet-ring.r2 { width:190px;height:60px; border-width:6px; border-color: rgba(180,150,60,0.4); }
  .planet-saturn  .planet-ring.r3 { width:152px;height:44px; border-width:5px; border-color: rgba(230,200,100,0.5); }
  .planet-uranus  .planet-body { width:96px;height:96px; background:radial-gradient(circle at 40% 38%, #c0f0f0, #7dd4d4 50%, #4aabab); box-shadow: inset -8px -8px 20px rgba(0,0,0,0.3), inset 4px 4px 12px rgba(200,255,255,0.3), 0 0 20px rgba(100,220,220,0.2); }
  .planet-neptune .planet-body { width:92px;height:92px; background:radial-gradient(circle at 38% 35%, #6090f8, #2040d0 55%, #101878); box-shadow: inset -8px -8px 20px rgba(0,0,0,0.4), inset 4px 4px 12px rgba(150,180,255,0.3), 0 0 20px rgba(50,80,220,0.3); }
  .planet-neptune .planet-body::after { content:''; position:absolute; width:28px;height:16px; background:rgba(80,120,255,0.6); border-radius:50%; top:28px; right:20px; filter:blur(3px); }

  .planet-name-display { font-family: 'Bangers', cursive; font-size: 1.8rem; color: white; letter-spacing: 2px; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); margin-bottom: 12px; }
  .planet-number { font-size: 0.72rem; font-weight: 900; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }

  .fact-list { display: flex; flex-direction: column; gap: 7px; text-align: left; margin-top: 4px; }
  .fact-item { display: flex; gap: 8px; align-items: flex-start; }
  .fact-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .fact-text { font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.75); line-height: 1.3; }
  .fact-text strong { color: var(--gold); }

  .wow-fact { margin-top: 10px; background: rgba(123,47,190,0.15); border: 1px solid rgba(123,47,190,0.3); border-radius: 12px; padding: 8px 12px; font-size: 0.82rem; font-weight: 700; color: #c4a0ff; line-height: 1.3; text-align: left; }
  .wow-fact::before { content: '🌟 WOW: '; font-family: 'Bangers', cursive; letter-spacing: 1px; }

  .q-prompt { font-family: 'Bangers', cursive; font-size: clamp(1.1rem, 3.5vw, 1.5rem); color: white; letter-spacing: 1px; text-align: center; margin-bottom: 12px; text-shadow: 1px 2px 0 rgba(0,0,0,0.4); }

  .reveal-card { display: none; background: rgba(45,198,83,0.08); border: 2px solid rgba(45,198,83,0.25); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .reveal-card.wrong-reveal { background: rgba(230,57,70,0.08); border-color: rgba(230,57,70,0.25); }
  .reveal-card.show { display: block; }
  .reveal-title { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 2px; margin-bottom: 8px; }
  .reveal-title.correct { color: var(--green); }
  .reveal-title.wrong   { color: var(--wrong); }
  .reveal-facts { display: flex; flex-direction: column; gap: 5px; }
  .reveal-fact { font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.7); line-height: 1.3; }
  .reveal-fact::before { content: '→ '; color: var(--gold); }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; margin-bottom: 12px; }
  .choice-btn { font-family: 'Bangers', cursive; font-size: 1.1rem; color: white; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); border: 2px solid rgba(255,255,255,0.18); border-radius: 14px; padding: 14px 8px; cursor: pointer; letter-spacing: 1px; text-shadow: 1px 2px 0 rgba(0,0,0,0.4); transition: transform 0.12s, box-shadow 0.12s; box-shadow: 0 5px 0 rgba(0,0,0,0.3); -webkit-user-select: none; user-select: none; }
  .choice-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
  .choice-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: linear-gradient(135deg, #2DC653, #1a8a35); border-color: #2DC653; box-shadow: 0 5px 0 #0f5c22; transform: translateY(-2px); }
  .choice-btn.wrong   { background: linear-gradient(135deg, #E63946, #a01f2a); border-color: #E63946; box-shadow: 0 5px 0 #6b1017; }
  .choice-btn.dimmed  { opacity: 0.3; }

  .feedback { font-family: 'Bangers', cursive; font-size: 1.2rem; letter-spacing: 1px; min-height: 28px; text-align: center; margin-bottom: 10px; }
  .feedback.correct { color: var(--green); text-shadow: 0 0 20px rgba(45,198,83,0.5); }
  .feedback.wrong   { color: var(--wrong);  text-shadow: 0 0 20px rgba(230,57,70,0.5); }
  .feedback.empty   { color: transparent; }

  .btn-next { font-family: 'Bangers', cursive; font-size: 1.3rem; letter-spacing: 2px; background: linear-gradient(135deg, var(--gold), #FF9F43); color: var(--space); border: none; border-radius: 50px; padding: 13px 40px; cursor: pointer; box-shadow: 0 6px 0 #b8960a; transition: transform 0.12s, box-shadow 0.12s; display: none; margin: 0 auto; }
  .btn-next.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .btn-next:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #b8960a; }
  .btn-next:active { transform: translateY(3px);  box-shadow: 0 3px 0 #b8960a; }

  .results { display: none; text-align: center; }
  .results.show { display: block; animation: fadeUp 0.5s ease both; }
  .results-trophy { font-size: 5rem; display: block; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .results-title { font-family: 'Bangers', cursive; font-size: clamp(2rem, 8vw, 3.5rem); color: var(--gold); letter-spacing: 3px; text-shadow: 3px 3px 0 rgba(100,0,200,0.5); margin-bottom: 6px; }
  .results-score { font-family: 'Bangers', cursive; font-size: 1.5rem; color: white; letter-spacing: 1px; margin-bottom: 6px; }
  .results-breakdown { font-size: 0.82rem; color: rgba(255,255,255,0.45); font-weight: 800; letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase; }
  .results-stars { font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 20px; display: block; }

  .fact-guide { margin-top: 16px; }
  .fact-guide-title { font-family: 'Bangers', cursive; font-size: 1.1rem; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
  .guide-planet { background: var(--panel); border: 2px solid var(--bord); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; }
  .guide-visual { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 54px; }
  .guide-info { flex: 1; }
  .guide-name { font-family: 'Bangers', cursive; font-size: 1.2rem; color: white; letter-spacing: 1px; margin-bottom: 5px; }
  .guide-facts { display: flex; flex-direction: column; gap: 3px; }
  .guide-fact { font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.6); line-height: 1.3; }
  .guide-fact::before { content: '• '; color: var(--gold); }

  .btn-new { font-family: 'Bangers', cursive; font-size: 1.3rem; letter-spacing: 2px; background: linear-gradient(135deg, #7B2FBE, #4a1080); color: white; border: none; border-radius: 50px; padding: 13px 40px; cursor: pointer; box-shadow: 0 6px 0 #2a0860; transition: transform 0.12s; margin-bottom: 12px; display: block; width: 100%; }
  .btn-new:hover  { transform: translateY(-3px); }
  .btn-new:active { transform: translateY(3px); }

  .btn-home { font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 2px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); border: 2px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 11px 32px; cursor: pointer; transition: all 0.15s; display: block; width: 100%; text-decoration: none; text-align: center; }
  .btn-home:hover { background: rgba(255,255,255,0.12); color: white; }

  .confetti-piece { position: fixed; top: -20px; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; z-index: 999; }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .splash { position: fixed; inset: 0; background: var(--space); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; animation: splashOut 0.5s ease 2s both; }
  @keyframes splashOut { to { opacity: 0; pointer-events: none; } }
  .splash-rocket { font-size: 5rem; animation: rocketLaunch 1.5s ease-in-out infinite alternate; }
  @keyframes rocketLaunch { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(-20px) rotate(5deg); } }
  .splash-title { font-family: 'Bangers', cursive; font-size: 3rem; color: var(--gold); letter-spacing: 4px; text-shadow: 3px 3px 0 rgba(100,0,200,0.6); animation: splashBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
  .splash-sub { color: rgba(255,255,255,0.5); font-weight: 800; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; animation: splashBounce 0.5s ease 0.7s both; }
  @keyframes splashBounce { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="splash">
  <div class="splash-rocket">🚀</div>
  <div class="splash-title">PLANET EXPLORER</div>
  <div class="splash-sub">8 planets • 2 phases • blast off!</div>
</div>

<div class="stars"></div>

<div class="page">

  <a class="btn-back" href="index.html">🏠 Back to HQ</a>

  <div class="header">
    <h1>🚀 PLANET EXPLORER 🚀</h1>
    <p>Learn the planets — then prove what you know!</p>
  </div>

  <div class="top-bar">
    <div><div class="score-label">SCORE</div><div class="score-val" id="scoreVal">0</div></div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 16</div>
    </div>
    <div><div class="score-label">BEST</div><div class="score-val" id="bestVal">0</div></div>
  </div>

  <div id="gameArea">
    <div class="phase-badge"><div class="phase-pill p1" id="phasePill">🔭 PHASE 1 — LEARN THE PLANETS</div></div>

    <div class="planet-card" id="planetCard" style="display:none">
      <div class="planet-number" id="planetNumber">PLANET 1 OF 8</div>
      <div class="planet-visual" id="planetVisual"></div>
      <div class="planet-name-display" id="planetNameDisplay"></div>
      <div class="fact-list" id="factList"></div>
      <div class="wow-fact" id="wowFact"></div>
    </div>

    <div class="q-prompt" id="qPrompt">Which planet is this?</div>

    <div class="reveal-card" id="revealCard">
      <div class="reveal-title" id="revealTitle">✅ CORRECT!</div>
      <div class="reveal-facts" id="revealFacts"></div>
    </div>

    <div class="choices" id="choicesGrid"></div>
    <div class="feedback empty" id="feedback">-</div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">NEXT ➜</button>
  </div>

  <div class="results" id="resultsScreen">
    <span class="results-trophy" id="resultsTrophy">🚀</span>
    <div class="results-title" id="resultsTitle">BLAST OFF!</div>
    <div class="results-score" id="resultsScore">16 out of 16</div>
    <div class="results-breakdown" id="resultsBreakdown">Phase 1 + Phase 2</div>
    <span class="results-stars" id="resultsStars">⭐⭐⭐⭐⭐</span>
    <div class="fact-guide" id="factGuide"></div>
    <button class="btn-new" onclick="startGame()" style="margin-top:16px;">🔄 PLAY AGAIN!</button>
    <a class="btn-home" href="index.html">🏠 Back to HQ</a>
  </div>

</div>

<script>
const PLANETS = [
  {
    key:'mercury', name:'Mercury', number:1, cssClass:'planet-mercury', color:'#8a7060',
    facts:[
      {icon:'☀️', text:'The <strong>closest planet</strong> to the Sun — 1st in line'},
      {icon:'🔥', text:'Temperatures swing from <strong>-180°C at night</strong> to <strong>430°C in the day</strong>'},
      {icon:'🌑', text:'The <strong>smallest planet</strong> in our solar system'},
    ],
    wow:"A year on Mercury is only 88 Earth days — but a day lasts 59 Earth days!",
    revealFacts:[
      "Mercury is the smallest planet — smaller than some moons",
      "It has no atmosphere so it can't hold heat overnight",
      "Mercury is about the size of Earth's moon",
    ],
  },
  {
    key:'venus', name:'Venus', number:2, cssClass:'planet-venus', color:'#d4a84b',
    facts:[
      {icon:'🌡️', text:'The <strong>hottest planet</strong> — even hotter than Mercury!'},
      {icon:'🌫️', text:'Covered in <strong>thick yellow clouds</strong> of acid'},
      {icon:'🔄', text:'Spins <strong>backwards</strong> compared to most planets'},
    ],
    wow:"A day on Venus is longer than a year on Venus — it spins incredibly slowly!",
    revealFacts:[
      "Venus is the hottest planet at around 465°C — hot enough to melt lead",
      "Its thick atmosphere traps heat like a blanket — this is the greenhouse effect",
      "Venus spins in reverse so the Sun rises in the west and sets in the east",
    ],
  },
  {
    key:'earth', name:'Earth', number:3, cssClass:'planet-earth', color:'#2877b8',
    facts:[
      {icon:'💧', text:'The <strong>only planet</strong> known to have life'},
      {icon:'🌊', text:'<strong>71% of Earth</strong> is covered in water'},
      {icon:'🌙', text:'Has <strong>one moon</strong> that controls our tides'},
    ],
    wow:"Earth is the densest planet in the solar system — it's the heaviest for its size!",
    revealFacts:[
      "Earth is the 3rd planet from the Sun",
      "Our atmosphere protects us from the Sun's harmful rays",
      "Earth takes 365.25 days to orbit the Sun — that extra 0.25 gives us a leap year every 4 years",
    ],
  },
  {
    key:'mars', name:'Mars', number:4, cssClass:'planet-mars', color:'#c0412a',
    facts:[
      {icon:'🔴', text:'Called the <strong>Red Planet</strong> because of iron oxide (rust) on its surface'},
      {icon:'🏔️', text:'Has <strong>Olympus Mons</strong> — the tallest volcano in the solar system'},
      {icon:'🤖', text:'Several <strong>robots and rovers</strong> have explored Mars'},
    ],
    wow:"Mars has two tiny moons called Phobos and Deimos — named after fear and dread!",
    revealFacts:[
      "Mars is about half the size of Earth",
      "Olympus Mons is nearly 3 times taller than Mount Everest",
      "Scientists think Mars once had liquid water billions of years ago",
    ],
  },
  {
    key:'jupiter', name:'Jupiter', number:5, cssClass:'planet-jupiter', color:'#c88040',
    facts:[
      {icon:'👑', text:'The <strong>biggest planet</strong> — more than 1,300 Earths could fit inside!'},
      {icon:'🌀', text:'The <strong>Great Red Spot</strong> is a storm that has lasted over 350 years'},
      {icon:'🌙', text:'Has <strong>95 known moons</strong> — more than any other planet'},
    ],
    wow:"Jupiter's magnetic field is the strongest of any planet — 20,000 times stronger than Earth's!",
    revealFacts:[
      "Jupiter is a gas giant — it has no solid surface to stand on",
      "The Great Red Spot is a storm bigger than Earth itself",
      "Jupiter acts like a vacuum cleaner — its gravity pulls in asteroids protecting Earth",
    ],
  },
  {
    key:'saturn', name:'Saturn', number:6, cssClass:'planet-saturn', color:'#c8a840',
    facts:[
      {icon:'💍', text:'Famous for its <strong>beautiful rings</strong> made of ice and rock'},
      {icon:'🏊', text:'So light it could <strong>float on water</strong> — the least dense planet'},
      {icon:'🌙', text:'Has <strong>146 known moons</strong> including Titan which has its own atmosphere'},
    ],
    wow:"Saturn's rings stretch 282,000 km wide but are only 1 km thick!",
    revealFacts:[
      "Saturn is the 6th planet from the Sun and the second largest",
      "Saturn's moon Titan has lakes and seas — but made of liquid methane not water",
      "Saturn takes 29 Earth years to orbit the Sun once",
    ],
  },
  {
    key:'uranus', name:'Uranus', number:7, cssClass:'planet-uranus', color:'#7dd4d4',
    facts:[
      {icon:'🔵', text:'An <strong>ice giant</strong> with a pale blue-green colour from methane gas'},
      {icon:'🔄', text:'Rotates <strong>on its side</strong> — its north pole points at the Sun'},
      {icon:'❄️', text:'One of the <strong>coldest planets</strong> — temperatures reach -224°C'},
    ],
    wow:"Uranus has 13 rings AND 28 moons — but was only discovered in 1781 with a telescope!",
    revealFacts:[
      "Uranus is the 7th planet from the Sun",
      "Because it spins on its side, one pole gets 42 years of sunlight then 42 years of darkness",
      "Uranus was the first planet discovered with a telescope",
    ],
  },
  {
    key:'neptune', name:'Neptune', number:8, cssClass:'planet-neptune', color:'#2040d0',
    facts:[
      {icon:'🔵', text:'The <strong>farthest planet</strong> from the Sun — 8th in line'},
      {icon:'💨', text:'Has the <strong>fastest winds</strong> in the solar system — up to 2,100 km/h!'},
      {icon:'🧊', text:'Another <strong>ice giant</strong> — deep blue from methane in its atmosphere'},
    ],
    wow:"One year on Neptune = 165 Earth years. It only completed its first orbit since discovery in 2011!",
    revealFacts:[
      "Neptune is so far away that sunlight takes 4 hours to reach it",
      "Neptune has 16 known moons — its largest Triton orbits backwards",
      "Neptune was predicted by maths before it was even seen through a telescope",
    ],
  },
];

const P2_QUESTIONS = [
  {q:"Which planet is the BIGGEST?",                     answer:"Jupiter",  distractors:["Saturn","Uranus","Neptune"]},
  {q:"Which planet is the SMALLEST?",                    answer:"Mercury",  distractors:["Mars","Venus","Earth"]},
  {q:"Which planet is CLOSEST to the Sun?",              answer:"Mercury",  distractors:["Venus","Earth","Mars"]},
  {q:"Which planet is FARTHEST from the Sun?",           answer:"Neptune",  distractors:["Uranus","Saturn","Jupiter"]},
  {q:"Which planet is known as the RED PLANET?",         answer:"Mars",     distractors:["Venus","Mercury","Jupiter"]},
  {q:"Which planet is the HOTTEST?",                     answer:"Venus",    distractors:["Mercury","Mars","Jupiter"]},
  {q:"Which planet has the most famous RINGS?",          answer:"Saturn",   distractors:["Jupiter","Uranus","Neptune"]},
  {q:"Which planet has the most MOONS?",                 answer:"Saturn",   distractors:["Jupiter","Uranus","Neptune"]},
  {q:"Which planet has a storm called the GREAT RED SPOT?", answer:"Jupiter", distractors:["Saturn","Neptune","Mars"]},
  {q:"Which planet has the FASTEST WINDS?",              answer:"Neptune",  distractors:["Jupiter","Saturn","Uranus"]},
  {q:"Which planet could FLOAT on water?",               answer:"Saturn",   distractors:["Uranus","Jupiter","Neptune"]},
  {q:"Which planet rotates on its SIDE?",                answer:"Uranus",   distractors:["Neptune","Saturn","Venus"]},
  {q:"Which planet is the ONLY one with life?",          answer:"Earth",    distractors:["Mars","Venus","Jupiter"]},
  {q:"Which planet spins BACKWARDS?",                    answer:"Venus",    distractors:["Uranus","Neptune","Mercury"]},
  {q:"Which planet has the TALLEST volcano?",            answer:"Mars",     distractors:["Earth","Venus","Jupiter"]},
  {q:"Which planet has the STRONGEST magnetic field?",   answer:"Jupiter",  distractors:["Saturn","Earth","Neptune"]},
];

let phase=1, p1Order=[], p2Questions=[];
let current=0, score=0, p1Score=0, p2Score=0, answered=false;
let best=parseInt(localStorage.getItem('planetBest')||'0');
const TOTAL=16;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

function updateStreak(){
  const today=new Date().toDateString(),last=localStorage.getItem('lastVisit');
  let streak=parseInt(localStorage.getItem('streak')||'0');
  if(last===today){}
  else if(last===new Date(Date.now()-86400000).toDateString()){streak++;localStorage.setItem('streak',streak);localStorage.setItem('lastVisit',today);}
  else{streak=1;localStorage.setItem('streak',streak);localStorage.setItem('lastVisit',today);}
}

function buildPlanetVisual(planetKey, size) {
  const wrap=document.createElement('div');
  wrap.className=`planet-${planetKey}`;
  if(planetKey==='saturn'){
    const rw=document.createElement('div'); rw.className='ring-wrap';
    const body=document.createElement('div'); body.className='planet-body';
    const r1=document.createElement('div'); r1.className='planet-ring';
    const r2=document.createElement('div'); r2.className='planet-ring r2';
    const r3=document.createElement('div'); r3.className='planet-ring r3';
    rw.appendChild(r3); rw.appendChild(r1); rw.appendChild(body); rw.appendChild(r2);
    wrap.appendChild(rw);
    if(size==='small'){rw.style.transform='scale(0.38)';rw.style.transformOrigin='center';wrap.style.height='50px';wrap.style.display='flex';wrap.style.alignItems='center';}
  } else {
    const body=document.createElement('div'); body.className='planet-body';
    if(size==='small'){body.style.width='38px';body.style.height='38px';}
    wrap.appendChild(body);
  }
  return wrap;
}

function startGame(){
  phase=1;
  p1Order=shuffle([...Array(8).keys()]);
  p2Questions=shuffle(P2_QUESTIONS).slice(0,8);
  current=0;score=0;p1Score=0;p2Score=0;answered=false;
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('gameArea').style.display='block';
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('bestVal').textContent=best;
  renderQuestion();
}

function renderQuestion(){
  answered=false;
  document.getElementById('revealCard').classList.remove('show');
  document.getElementById('btnNext').classList.remove('show');
  document.getElementById('btnNext').textContent='NEXT ➜';
  document.getElementById('feedback').className='feedback empty';
  document.getElementById('feedback').textContent='-';
  const totalDone=(phase===1?current:8+current);
  document.getElementById('progressFill').style.width=(totalDone/TOTAL*100)+'%';
  document.getElementById('progressText').textContent=totalDone+' / '+TOTAL;
  if(phase===1)renderPhase1(); else renderPhase2();
}

function renderPhase1(){
  const planet=PLANETS[p1Order[current]];
  document.getElementById('phasePill').textContent='🔭 PHASE 1 — LEARN THE PLANETS';
  document.getElementById('phasePill').className='phase-pill p1';
  const card=document.getElementById('planetCard'); card.style.display='block';
  document.getElementById('planetNumber').textContent='PLANET '+(current+1)+' OF 8';
  document.getElementById('planetNameDisplay').textContent=planet.name;
  document.getElementById('wowFact').textContent=planet.wow;
  const vis=document.getElementById('planetVisual'); vis.innerHTML='';
  vis.appendChild(buildPlanetVisual(planet.key,'large'));
  const fl=document.getElementById('factList'); fl.innerHTML='';
  planet.facts.forEach(f=>{
    const item=document.createElement('div'); item.className='fact-item';
    item.innerHTML=`<span class="fact-icon">${f.icon}</span><span class="fact-text">${f.text}</span>`;
    fl.appendChild(item);
  });
  document.getElementById('qPrompt').textContent='⬆️ Read the facts above — then tap the planet\'s name below!';
  const others=shuffle(PLANETS.filter(p=>p.key!==planet.key)).slice(0,3).map(p=>p.name);
  buildChoices(shuffle([planet.name,...others]),planet.name,planet);
}

function renderPhase2(){
  const q=p2Questions[current];
  document.getElementById('phasePill').textContent='🧠 PHASE 2 — PLANET FACTS QUIZ';
  document.getElementById('phasePill').className='phase-pill p2';
  document.getElementById('planetCard').style.display='none';
  document.getElementById('qPrompt').textContent=q.q;
  const planet=PLANETS.find(p=>p.name===q.answer);
  buildChoices(shuffle([q.answer,...q.distractors.slice(0,3)]),q.answer,planet);
}

function buildChoices(choices,correct,planet){
  const grid=document.getElementById('choicesGrid'); grid.innerHTML='';
  choices.forEach(name=>{
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.textContent=name;
    btn.onclick=()=>handleChoice(btn,name,correct,planet);
    grid.appendChild(btn);
  });
}

function handleChoice(btn,chosen,correct,planet){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  const reveal=document.getElementById('revealCard');
  const isCorrect=chosen===correct;

  if(isCorrect){
    score++; if(phase===1)p1Score++; else p2Score++;
    document.getElementById('scoreVal').textContent=score;
    btn.classList.add('correct');
    fb.className='feedback correct';
    fb.textContent=['SUPERSTAR! 🌟','NAILED IT! 🚀','BRILLIANT! ⭐','SPACE GENIUS! 🛸','ON FIRE! ☄️'][Math.floor(Math.random()*5)];
    if(score>best){best=score;localStorage.setItem('planetBest',best);document.getElementById('bestVal').textContent=best;}
  } else {
    btn.classList.add('wrong');
    fb.className='feedback wrong';
    fb.textContent=`It was ${correct}! 🔭`;
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent===correct)b.classList.add('correct');
      else if(b!==btn)b.classList.add('dimmed');
    });
  }

  if(planet&&planet.revealFacts){
    reveal.className='reveal-card show'+(isCorrect?'':' wrong-reveal');
    const rt=document.getElementById('revealTitle');
    rt.className='reveal-title '+(isCorrect?'correct':'wrong');
    rt.textContent=isCorrect?`✅ ${correct} — Did you know?`:`❌ That was ${correct}! Here's why:`;
    const rf=document.getElementById('revealFacts'); rf.innerHTML='';
    planet.revealFacts.forEach(f=>{
      const d=document.createElement('div'); d.className='reveal-fact'; d.textContent=f; rf.appendChild(d);
    });
  }

  setTimeout(()=>{
    const isLast=(phase===1&&current===7)||(phase===2&&current===7);
    if(isLast){
      if(phase===1){document.getElementById('btnNext').textContent='START PHASE 2 ➜';}
      else{setTimeout(showResults,1000);return;}
    }
    document.getElementById('btnNext').classList.add('show');
  },700);
}

function nextQuestion(){
  if(phase===1&&current===7){phase=2;current=0;}
  else current++;
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showResults(){
  updateStreak();
  document.getElementById('gameArea').style.display='none';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent=TOTAL+' / '+TOTAL;
  document.getElementById('resultsScreen').classList.add('show');
  const pct=score/TOTAL;
  let trophy,title;
  if(score===TOTAL){trophy='🏆';title='PERFECT MISSION!';launchConfetti(90);}
  else if(pct>=0.75){trophy='🌟';title='AMAZING!';launchConfetti(50);}
  else if(pct>=0.5){trophy='🚀';title='GREAT EXPLORER!';}
  else if(pct>=0.3){trophy='🔭';title='KEEP EXPLORING!';}
  else{trophy='🛸';title='TRY AGAIN!';}
  document.getElementById('resultsTrophy').textContent=trophy;
  document.getElementById('resultsTitle').textContent=title;
  document.getElementById('resultsScore').textContent=score+' out of '+TOTAL;
  document.getElementById('resultsBreakdown').textContent=`Phase 1: ${p1Score}/8  •  Phase 2: ${p2Score}/8`;
  const stars=Math.min(5,Math.round(pct*5));
  document.getElementById('resultsStars').textContent='⭐'.repeat(stars)+'⬜'.repeat(5-stars);
  buildFactGuide();
  document.getElementById('resultsScreen').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildFactGuide(){
  const guide=document.getElementById('factGuide');
  guide.innerHTML='<div class="fact-guide-title">📚 Planet Fact Guide</div>';
  PLANETS.forEach(planet=>{
    const row=document.createElement('div'); row.className='guide-planet';
    const visWrap=document.createElement('div'); visWrap.className='guide-visual';
    visWrap.appendChild(buildPlanetVisual(planet.key,'small'));
    row.appendChild(visWrap);
    const info=document.createElement('div'); info.className='guide-info';
    info.innerHTML=`<div class="guide-name">${planet.number}. ${planet.name}</div>`;
    const facts=document.createElement('div'); facts.className='guide-facts';
    planet.revealFacts.forEach(f=>{
      const d=document.createElement('div'); d.className='guide-fact'; d.textContent=f; facts.appendChild(d);
    });
    info.appendChild(facts); row.appendChild(info); guide.appendChild(row);
  });
}

function launchConfetti(count){
  const colors=['#FFD93D','#7B2FBE','#2DC653','#E63946','#4a9eff','#FF9F43'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const p=document.createElement('div'); p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      p.style.width=(8+Math.random()*8)+'px'; p.style.height=(8+Math.random()*8)+'px';
      p.style.borderRadius=Math.random()>0.5?'50%':'2px';
      p.style.animationDuration=(2+Math.random()*2)+'s';
      p.style.animationDelay=(Math.random()*0.3)+'s';
      document.body.appendChild(p); setTimeout(()=>p.remove(),5000);
    },i*18);
  }
}

document.getElementById('bestVal').textContent=best;
startGame();
</script>
</body>
</html>
